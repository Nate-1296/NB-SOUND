name: Reporte de bug
description: Reporta un fallo o comportamiento inesperado de NB SOUND
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Gracias por reportar el bug. Antes de empezar:

        - Verifica que no exista ya un [issue similar](https://github.com/Nate-1296/NB-SOUND/issues?q=is%3Aissue).
        - Si es una vulnerabilidad de seguridad, **no la reportes aquí**; usa
          [Security Advisories](https://github.com/Nate-1296/NB-SOUND/security/advisories/new).
        - Revisa primero [`docs/troubleshooting.md`](https://github.com/Nate-1296/NB-SOUND/blob/main/docs/troubleshooting.md).

  - type: textarea
    id: description
    attributes:
      label: Descripción
      description: Explica el bug en una o dos frases.
      placeholder: La importación se detiene al procesar archivos sin tags ID3...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Pasos para reproducir
      description: Lista numerada y mínima para llegar al mismo estado.
      placeholder: |
        1. Abrir la UI con `python main_ui.py`
        2. Importar la carpeta /ruta/X
        3. Hacer clic en Y
        4. Observar que Z falla
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamiento esperado
      placeholder: La importación debería marcar los archivos sin tags como pendientes de revisión y continuar.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportamiento observado
      description: Incluye trazas, errores o capturas si aplican.
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Sistema operativo
      options:
        - Linux (Ubuntu / Debian / Pop!_OS)
        - Linux (Fedora / RHEL)
        - Linux (Arch / Manjaro)
        - Linux (otra distro)
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows 11
        - Windows 10
        - Otro
    validations:
      required: true

  - type: input
    id: version_os
    attributes:
      label: Versión del sistema operativo
      placeholder: "Ubuntu 22.04, macOS 14.2, Windows 11 23H2..."

  - type: input
    id: version_app
    attributes:
      label: Versión de NB SOUND
      description: Resultado de `python main.py --version` o `python main_ui.py --version`.
      placeholder: "NB SOUND CLI v1"
    validations:
      required: true

  - type: input
    id: version_python
    attributes:
      label: Versión de Python
      placeholder: "3.12.10"
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: Método de instalación
      options:
        - Bundle de release (Linux .tar.gz / AppImage)
        - Bundle de release (Windows .zip)
        - Bundle de release (macOS .zip / .dmg)
        - Código fuente con venv
        - Otro
    validations:
      required: true

  - type: dropdown
    id: subsystem
    attributes:
      label: Subsistema afectado
      description: Marca el área principal donde se manifiesta el bug.
      options:
        - Importación / catalogación
        - Reproductor / cola
        - Biblioteca (álbumes / artistas / pistas)
        - Búsqueda
        - Playlists
        - Karaoke
        - DJ Privado
        - Explorador Ciego
        - Audio Intelligence (análisis profundo)
        - Configuración / UI general
        - CLI
        - Empaquetado / instalación
        - Otro
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs relevantes
      description: Pega las últimas líneas de `tagger_run.log` o la salida del traceback. Revisa que no contengan claves de API ni rutas privadas.
      render: text

  - type: checkboxes
    id: checklist
    attributes:
      label: Confirmaciones
      options:
        - label: Busqué en issues existentes antes de abrir éste.
          required: true
        - label: No expongo claves de API ni datos personales sensibles en el reporte.
          required: true
